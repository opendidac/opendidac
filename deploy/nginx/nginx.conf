events {}

http {
    client_max_body_size 5M; # Increase the maximum upload size to 5MB

    server {
        listen 80;
        server_name _;

        # Redirect http to https
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extend timeouts for long-lived connections
            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # Add a specific location block for SSE requests
        location /api/session-sse {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP/1.1 with an empty Connection header is required for SSE:
            # without these, nginx talks HTTP/1.0 upstream and the streaming
            # response gets torn down, which surfaces as the "Connection
            # lost" overlay flapping in the web app.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Disable buffering for SSE so events reach the client immediately
            proxy_buffering off;
            proxy_cache off;

            # Extend timeouts for SSE connections
            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }
    }
}

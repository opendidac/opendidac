events {}

http {
    server {
        listen 80;
        server_name _;

        # Redirect http to https
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # MIGRATION NOTICE (temporary branch): the app has moved to
        # https://opendidac.heig-vd.in/ — serve the static notice for every
        # route so old bookmarks (e.g. /assignments) also see the message.
        root /usr/share/nginx/html;

        location / {
            try_files /migration.html =404;
        }
    }
}
